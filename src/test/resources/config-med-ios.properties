# Clear the BSI per-IP rate-limit (DELETE /api/v2/restrict) before each flow so back-to-back
# registrations aren't throttled (the flow-3 "Login failed / try again" IP block). Works because
# the local device egresses through the same host IP as this call (per-IP clear — see
# RateLimitService). Uses api.base.url + bsi.restrict.apikey from config.properties.
