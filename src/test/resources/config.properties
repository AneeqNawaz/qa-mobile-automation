# Appium
appium.url=http://127.0.0.1:4723

# Timeouts
explicit.wait.seconds=30

# Snapshot
snapshot.mode=verify

# App reset — set to true for regression E2E tests (pm clear before each test)
reset.app.data=false

# Environment
env=prod
skip.games=false

# BrowserStack
browserstack.enabled=false
browserstack.username=${BROWSERSTACK_USERNAME}
browserstack.access.key=${BROWSERSTACK_ACCESS_KEY}
browserstack.app.url=${BROWSERSTACK_APP_URL}
browserstack.project=QA Mobile Automation
browserstack.build.name=Local

# API
api.base.url=https://api.bsi.nn-services.de
mock.hi.base.url=https://hi.bsi.nn-services.de
# apikey for DELETE /api/v2/restrict (clears the per-IP rate-limit block). LOCAL-only.
bsi.restrict.apikey=019e64a6-c9ef-7ed9-9340-4ffa2cc9f344

# IMAP — for reading verification emails from shared @nntest.de mailbox
# Password MUST be set via env var IMAP_PASSWORD in CI (never commit secrets)
imap.host=sslin.df.eu
imap.port=143
imap.username=all@nntest.de
imap.password=${IMAP_PASSWORD}
